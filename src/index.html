<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega - AI Agent & Financial Tracker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="root">
        <div class="container">
            <header class="header">
                <h1>⚙️ OMEGA</h1>
                <p>Autonomous AI Agent + Financial Tracker Platform</p>
            </header>

            <main class="main">
                <section class="input-section">
                    <h2>Enter Your Goal</h2>
                    <div class="input-group">
                        <textarea id="goalInput" placeholder="What should OMEGA do? E.g., 'Analyze my spending patterns'" rows="4"></textarea>
                        <button id="submitBtn" class="btn-primary">Execute Goal</button>
                    </div>
                </section>

                <section class="status-section">
                    <h2>Execution Status</h2>
                    <div id="statusOutput" class="status-box">
                        <p class="idle-text">Awaiting goal submission...</p>
                    </div>
                </section>

                <section class="log-section">
                    <h2>Iteration Log</h2>
                    <div id="logOutput" class="log-box"></div>
                </section>
            </main>

            <footer class="footer">
                <p>Powered by Google Gemini API | Running on Vercel</p>
            </footer>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
